<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding RSVP</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@500&family=Inter&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(to right, #fdf6ec, #f8ecd9);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  .card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    width: 350px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    text-align: center;
    border: 1px solid #f1e3c6;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    color: #b8962e;
    margin-bottom: 5px;
    letter-spacing: 2px;
  }

  .subtitle {
    font-size: 12px;
    letter-spacing: 2px;
    color: #c9a74e;
    margin-bottom: 25px;
  }

  label {
    display: block;
    text-align: left;
    font-size: 12px;
    margin-top: 15px;
    color: #6b5b3e;
    font-weight: 600;
  }

  input, textarea {
    width: 92%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 10px;
    border: 1px solid #e8d9b5;
    background: #fff;
    outline: none;
  }

  input:focus, textarea:focus {
    border-color: #d4af37;
  }

  textarea {
    resize: none;
    height: 80px;
  }

  button {
    margin-top: 25px;
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #d4af37, #b8962e);
    color: white;
    font-weight: bold;
    letter-spacing: 1px;
    cursor: pointer;
  }

  button:hover {
    opacity: 0.9;
  }

  /* Wedding footer */
.footer {
  margin-top: 35px;
  text-align: center;
}

.names {
  font-family: 'Great Vibes', cursive;
  font-size: 48px;
  color: #a67c00; /* deeper gold */
  font-weight: bold;
  letter-spacing: 1px;
}

.names span {
  font-size: 28px;
  margin: 0 10px;
  color: #444;
}

.message {
  font-size: 15px;
  color: #5a4a2f;
  margin-top: 10px;
  line-height: 1.6;
}

</style>
</head>

<body>

<div class="card">
  <h1>RSVP</h1>

  <!-- Wedding Names Section -->
    <div class="footer">
      <!-- <div class="names">Randika & Wathsala</div> -->
      <div class="message">
        Together with our families, we warmly invite you to celebrate our special day.<br>
      </div>
    </div>

  <form action="https://formspree.io/f/xbdzboqp" method="POST">

    <label>Guest Name</label>
    <input type="text" name="guest_name" placeholder="Your Name" required>

    <label>Number of Guests</label>
    <input type="number" name="guests" placeholder="Guest Count" required>

    <label>Remarks (Optional)</label>
    <textarea name="remarks" placeholder="Share anything you'd like us to know..."></textarea>

    <button type="submit">Submit</button>

  </form>
</div>



</body>
</html>
