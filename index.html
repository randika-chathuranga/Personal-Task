<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding RSVP</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@500&family=Inter&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,body{
  width:100%;
  overflow-x:hidden;
  font-family:'Inter',sans-serif;
  background:linear-gradient(to bottom,#fdf6ec);
  padding:20px;
}

.card{
  background:white;
  padding:25px;
  border-radius:20px;
  width:100%;
  max-width:400px;
  margin:auto;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  border:1px solid #f1e3c6;
  text-align:center;
}

h1{
  font-family:'Playfair Display',serif;
  color:#b8962e;
  margin-bottom:5px;
  letter-spacing:2px;
  font-size:24px;
}

label{
  display:block;
  font-size:13px;
  margin-top:15px;
  color:#6b5b3e;
  font-weight:600;
  text-align:left;
}

input,textarea{
  width:100%;
  padding:14px;
  margin-top:6px;
  border-radius:12px;
  border:1px solid #e8d9b5;
  font-size:14px;
  outline:none;
  background:#fff;
}

input:focus,textarea:focus{
  border-color:#d4af37;
}

textarea{
  resize:none;
  height:80px;
}

button{
  margin-top:20px;
  width:100%;
  padding:16px;
  border-radius:12px;
  border:none;
  background:linear-gradient(135deg,#d4af37,#b8962e);
  color:white;
  font-weight:bold;
  font-size:15px;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.footer{
  margin-top:20px;
  text-align:center;
}

.message{
  font-size:14px;
  color:#5a4a2f;
  margin-top:8px;
  line-height:1.6;
}

.option-group{
  margin-top:20px;
  text-align:left;
}

.option-row{
  display:flex;
  gap:20px;
  margin-top:10px;
}

.option-row label{
  margin-top:0;
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:500;
}

.option-row input{
  width:auto;
  margin:0;
}

#guestFields{
  display:none;
}

@media (max-width:480px){
  .card{
    padding:20px;
  }

  h1{
    font-size:20px;
  }

  input,textarea,button{
    font-size:14px;
    padding:12px;
  }
}
</style>
</head>

<body>

<div class="card">
<h1>RSVP</h1>

<div class="footer">
  <div class="message">
    Together with our families, we warmly invite you to celebrate our special day.
  </div>
</div>

<form action="https://formspree.io/f/xbdzboqp" method="POST">

  <!-- Joining Question -->
  <div class="option-group">
    <label>Are you joining with us?</label>

    <div class="option-row">
      <label>
        <input type="radio" name="joining" value="Yes" onclick="toggleFields(true)" required>
        Yes
      </label>

      <label>
        <input type="radio" name="joining" value="No" onclick="toggleFields(false)">
        No
      </label>
    </div>
  </div>

  <!-- Hidden Fields -->
  <div id="guestFields">

    <label>Guest Name</label>
    <input type="text" name="guest_name" placeholder="Your Name">

    <label>Number of Guests</label>
    <input type="number" name="guests" placeholder="Guest Count">

    <label>Remarks (Optional)</label>
    <textarea name="remarks" placeholder="Share anything you'd like us to know..."></textarea>

  </div>

  <button type="submit">Submit</button>

</form>
</div>

<script>
function toggleFields(show){
  const fields = document.getElementById("guestFields");
  const guestName = document.querySelector('input[name="guest_name"]');
  const guests = document.querySelector('input[name="guests"]');

  if(show){
    fields.style.display = "block";
    guestName.required = true;
    guests.required = true;
  }else{
    fields.style.display = "none";
    guestName.required = false;
    guests.required = false;
  }
}
</script>

</body>
</html>
