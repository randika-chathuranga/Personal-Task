<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RSVP</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f7f3eb;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background: #fffaf5;
    padding: 40px;
    border-radius: 20px;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    text-align: center;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    color: #6b5b3e;
    margin-bottom: 5px;
  }

  .subtitle {
    font-size: 12px;
    letter-spacing: 2px;
    color: #bfa46f;
    margin-bottom: 25px;
  }

  label {
    display: block;
    text-align: left;
    font-size: 12px;
    margin-top: 15px;
    color: #6b5b3e;
    font-weight: 600;
  }

  input, textarea {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 10px;
    border: 1px solid #e5d8c3;
    background: #fff;
    outline: none;
  }

  input:focus, textarea:focus {
    border-color: #d4af37;
  }

  textarea {
    resize: none;
    height: 80px;
  }

  button {
    margin-top: 25px;
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #d4af37, #b8962e);
    color: white;
    font-weight: bold;
    letter-spacing: 1px;
    cursor: pointer;
  }

  button:hover {
    opacity: 0.9;
  }

</style>
</head>

<body>

<div class="card">
  <h1>RSVP</h1>
  <div class="subtitle">JOIN US IN CELEBRATION</div>

  <form action="https://formspree.io/f/xbdzboqp" method="POST">

    <label>Guest Name</label>
    <input type="text" name="guest_name" placeholder="Your full name" required>

    <label>Number of Guests</label>
    <input type="number" name="guests" placeholder="Total attending" required>

    <label>Remarks (Optional)</label>
    <textarea name="remarks" placeholder="Share anything you'd like us to know..."></textarea>

    <button type="submit">CONFIRM ATTENDANCE</button>

  </form>
</div>

</body>
</html>
