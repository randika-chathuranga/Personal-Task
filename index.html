<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding RSVP</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@500&family=Inter&display=swap" rel="stylesheet">

<style>
 /* ================= Global Reset & Box Sizing ================= */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  overflow-x: hidden; /* Prevent horizontal scroll on mobile */
  font-family: 'Inter', sans-serif;
  background: linear-gradient(to bottom, #fdf6ec);
  padding: 20px;
}

/* ================= Card Container ================= */
.card {
  background: white;
  padding: 25px;
  border-radius: 20px;
  width: 100%;
  max-width: 400px;
  margin: auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  border: 1px solid #f1e3c6;
  text-align: center;
}

/* ================= Title ================= */
h1 {
  font-family: 'Playfair Display', serif;
  color: #b8962e;
  text-align: center;
  margin-bottom: 5px;
  letter-spacing: 2px;
  font-size: 24px;
}

/* ================= Subtitle / Event Details ================= */
.subtitle, .event-details {
  font-size: 13px;
  color: #6b5b3e;
  margin-top: 10px;
  margin-bottom: 20px;
  line-height: 1.6;
  text-align: center;
}

/* ================= Labels ================= */
label {
  display: block;
  font-size: 13px;
  margin-top: 15px;
  color: #6b5b3e;
  font-weight: 600;
  text-align: left;
}

/* ================= Inputs & Textarea ================= */
input, textarea {
  width: 100%; /* Full width, avoids overflow */
  padding: 14px;
  margin-top: 6px;
  border-radius: 12px;
  border: 1px solid #e8d9b5;
  font-size: 14px;
  outline: none;
  background: #fff;
}

input:focus, textarea:focus {
  border-color: #d4af37;
}

textarea {
  resize: none;
  height: 80px;
}

/* ================= Button ================= */
button {
  margin-top: 20px;
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #d4af37, #b8962e);
  color: white;
  font-weight: bold;
  font-size: 15px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

/* ================= Footer ================= */
.footer {
  margin-top: 30px;
  text-align: center;
}

.names {
  font-family: 'Great Vibes', cursive;
  font-size: 42px;
  color: #a67c00;
  font-weight: bold;
  letter-spacing: 1px;
}

.names span {
  font-size: 26px;
  margin: 0 8px;
  color: #444;
}

.message {
  font-size: 14px;
  color: #5a4a2f;
  margin-top: 8px;
  line-height: 1.6;
}

/* ================= Responsive: Mobile Devices ================= */
@media (max-width: 480px) {
  .card {
    padding: 20px;
  }

  h1 {
    font-size: 20px;
  }

  input, textarea, button {
    font-size: 14px;
    padding: 12px;
  }

  .names {
    font-size: 36px;
  }

  .names span {
    font-size: 24px;
  }
}

/* ================= Responsive: Larger Phones / iPhone 10-16 ================= */
@media (max-width: 428px) { /* Covers iPhone 12/14 Pro Max width */
  .card {
    padding: 18px;
  }

  h1 {
    font-size: 22px;
  }

  input, textarea, button {
    font-size: 14px;
    padding: 12px;
  }

  .names {
    font-size: 38px;
  }

  .names span {
    font-size: 24px;
  }
}
</style>
</head>

<body>

<div class="card">
  <h1>RSVP</h1>

  <!-- Wedding Names Section -->
    <div class="footer">
      <!-- <div class="names">Randika & Wathsala</div> -->
      <div class="message">
        Together with our families, we warmly invite you to celebrate our special day.<br>
      </div>
    </div>

  <form action="https://formspree.io/f/xbdzboqp" method="POST">

    <label>Guest Name</label>
    <input type="text" name="guest_name" placeholder="Your Name" required>

    <label>Number of Guests</label>
    <input type="number" name="guests" placeholder="Guest Count" required>

    <label>Remarks (Optional)</label>
    <textarea name="remarks" placeholder="Share anything you'd like us to know..."></textarea>

    <button type="submit">Submit</button>

  </form>
</div>



</body>
</html>
